name: claudart
description: A Dart CLI for managing structured debug and suggestion sessions via local markdown workspaces. Works with any editor that supports slash commands.
version: 1.0.0
repository: https://github.com/liitx/claudart_cli
issue_tracker: https://github.com/liitx/claudart_cli/issues

environment:
  sdk: '>=3.0.0 <5.0.0'

executables:
  claudart: claudart

dependencies:
  args: ^2.5.0
  path: ^1.8.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
  mocktail: ^1.0.0

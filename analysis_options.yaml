include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat missing enum cases as errors — exhaustive switches are required
    missing_enum_constant_in_switch: error
    # Treat dead code as a warning — unused enum branches are a smell
    dead_code: warning

linter:
  rules:
    # --- Type safety ---
    avoid_dynamic_calls: true
    avoid_returning_null_for_future: true
    prefer_void_to_null: true

    # --- Enum-first / no bare strings ---
    # NOTE: Dart's built-in lints cannot enforce "use an enum instead of a
    # string literal". Architectural rule is documented in code.md.
    # TODO: add custom_lint rule (bare_string_for_enum) in a future session.
    # In the meantime: exhaustive switch on enums is enforced via
    # missing_enum_constant_in_switch above.

    # --- Immutability ---
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_const_constructors: true
    prefer_const_declarations: true

    # --- Code clarity ---
    avoid_catches_without_on_clauses: true
    cancel_subscriptions: true
    close_sinks: true
    use_string_buffers: true
    prefer_single_quotes: true

    # --- Performance ---
    avoid_slow_async_io: true
    prefer_is_empty: true
    prefer_is_not_empty: true
